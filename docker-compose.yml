  shard-service-3-replica:
    build:
      context: .
      dockerfile: Dockerfile.shard-service
    container_name: shard-service-3-replica
    environment:
      PORT: "8080"
      INDEX_DIR: /app/index_data
      TOTAL_SHARDS: "16"
      SHARD_IDS: "8,9,10,11"
      SERVICE_NAME: shard-service-3-replica
    volumes:
      - ./index_data:/app/index_data:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  shard-service-4-replica:
    build:
      context: .
      dockerfile: Dockerfile.shard-service
    container_name: shard-service-4-replica
    environment:
      PORT: "8080"
      INDEX_DIR: /app/index_data
      TOTAL_SHARDS: "16"
      SHARD_IDS: "12,13,14,15"
      SERVICE_NAME: shard-service-4-replica
    volumes:
      - ./index_data:/app/index_data:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Nginx load balancer
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: nginx
    ports:
      - "8080:8080"
    depends_on:
      shard-service-1:
        condition: service_healthy
      shard-service-2:
        condition: service_healthy
      shard-service-3:
        condition: service_healthy
      shard-service-4:
        condition: service_healthy
      shard-service-1-replica:
        condition: service_healthy
      shard-service-2-replica:
        condition: service_healthy
      shard-service-3-replica:
        condition: service_healthy
      shard-service-4-replica:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Query service using nginx as backend
  query-service:
    build:
      context: .
      dockerfile: Dockerfile.query-service
    container_name: query-service
    environment:
      PORT: "8090"
      REDIS_ADDR: "redis:6379"
      # Now uses nginx as single entry point instead of directly calling shards
      SHARD_SERVICES: "http://nginx:8080"
      ENABLE_HOT_SHARD: "true"
    ports:
      - "8090:8090"
    depends_on:
      - redis
      - nginx

volumes:
  redis_data: