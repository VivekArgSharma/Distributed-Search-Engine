services:
  # Primary shard services
  shard-service-1:
    build:
      context: .
      dockerfile: Dockerfile.shard-service
    container_name: shard-service-1
    environment:
      PORT: "8080"
      INDEX_DIR: /app/index_data
      TOTAL_SHARDS: "16"
      SHARD_IDS: "0,1,2,3"
      SERVICE_NAME: shard-service-1
    ports:
      - "8081:8080"
    volumes:
      - ./index_data:/app/index_data:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  shard-service-2:
    build:
      context: .
      dockerfile: Dockerfile.shard-service
    container_name: shard-service-2
    environment:
      PORT: "8080"
