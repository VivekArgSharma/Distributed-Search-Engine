      timeout: 5s
      retries: 3
      start_period: 15s

  shard-service-2-replica:
    build:
      context: .
      dockerfile: Dockerfile.shard-service
    container_name: shard-service-2-replica
    environment:
      PORT: "8080"
      INDEX_DIR: /app/index_data
      TOTAL_SHARDS: "16"
      SHARD_IDS: "4,5,6,7"
