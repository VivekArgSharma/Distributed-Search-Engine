      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Replica shard services
  shard-service-1-replica:
    build:
      context: .
      dockerfile: Dockerfile.shard-service
    container_name: shard-service-1-replica
    environment:
