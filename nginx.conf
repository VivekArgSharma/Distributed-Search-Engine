worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # Map shard ID to upstream
    map $arg_query $upstream {
        default "http://shard-0";
        
        # Use consistent hash for better distribution
        "~" "http://shard-0";
    }

    # Simple round-robin across all 8 primary services
    # Each primary has a replica - nginx will handle failover
    upstream all_shards {
        server shard-service-1:8080;
        server shard-service-1-replica:8080;
        server shard-service-2:8080;
        server shard-service-2-replica:8080;
        server shard-service-3:8080;
        server shard-service-3-replica:8080;
        server shard-service-4:8080;
        server shard-service-4-replica:8080;
    }

    # Server with load balancing
    server {
        listen 8080;
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "nginx healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Main search endpoint - routes to all shards with round-robin
        location = /search {
            proxy_pass http://all_shards/search;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
        
        # Also accept /search with query params
        location /search {
            proxy_pass http://all_shards/search;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
    }
}