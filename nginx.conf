worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression - disable for JSON API responses (they're already small)
    gzip off;

    # Upstream with connection pooling (keepalive)
    upstream all_shards {
        server shard-service-1:8080 max_fails=3 fail_timeout=30s;
        server shard-service-1-replica:8080 max_fails=3 fail_timeout=30s;
        server shard-service-2:8080 max_fails=3 fail_timeout=30s;
        server shard-service-2-replica:8080 max_fails=3 fail_timeout=30s;
        server shard-service-3:8080 max_fails=3 fail_timeout=30s;
        server shard-service-3-replica:8080 max_fails=3 fail_timeout=30s;
        server shard-service-4:8080 max_fails=3 fail_timeout=30s;
        server shard-service-4-replica:8080 max_fails=3 fail_timeout=30s;
        
        # Connection pooling
        keepalive 32;
    }

    # Server with load balancing
    server {
        listen 8080;
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "nginx healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Main search endpoint
        location = /search {
            proxy_pass http://all_shards/search;
            
            # HTTP/1.1 for keepalive
            proxy_http_version 1.1;
            
            # Connection header for keepalive
            proxy_set_header Connection "";
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 2s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 24k;
        }
        
        # Also accept /search with query params
        location /search {
            proxy_pass http://all_shards/search;
            
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 2s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
            
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 24k;
        }
    }
}